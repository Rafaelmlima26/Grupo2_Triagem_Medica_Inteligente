services:
  # banco de dados postgresql pra guardar o historico de triagens
  postgres:
    image: postgres:16
    container_name: triagem-medica-db
    environment:
      POSTGRES_DB: triagem_medica
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d triagem_medica"]
      interval: 5s
      timeout: 5s
      retries: 5

  # servico de machine learning em python (fastapi + sklearn)
  ml-service:
    build: ./ml-service
    container_name: triagem-ml-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # api principal em spring boot
  triagem-service:
    build: ./triagem-medica
    container_name: triagem-medica-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/triagem_medica
      DB_USER: admin
      DB_PASSWORD: admin123
      ML_SERVICE_URL: http://ml-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy

volumes:
  postgres_data:
